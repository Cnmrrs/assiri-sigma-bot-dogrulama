<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGGNI BOT DOĞRULAMA</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        /* Tamamen düz, süssüz tasarım */
        html, body {
            height: 100%;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #ffffff;
            color: #000000;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        .captcha-wrapper {
            margin-top: 20px;
        }
        button {
            margin-top: 15px;
            padding: 5px 15px;
            cursor: pointer;
        }
        footer {
            font-size: 14px;
            font-weight: bold;
            margin-top: auto;
            padding-top: 40px;
        }
    </style>
</head>
<body>

    <div>
        <h1>AGGNI BOT DOĞRULAMA</h1>
        
        <form action="#" method="POST" onsubmit="alert('hadi yolunaaa'); return false;">
            <div class="captcha-wrapper">
                <div class="g-recaptcha" data-sitekey="6Lf2vEEtAAAAAJmM9VyBExmEjN7g2F5faZ3aty39"></div>
            </div>
            <button type="submit">Doğrula</button>
        </form>
    </div>

    <footer>GÜNEY SIÇTIN KOÇÇÇÇÇÇÇÇUUUUUUUM</footer>

</body>
</html>
